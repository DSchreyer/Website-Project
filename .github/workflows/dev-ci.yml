name: Dev CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML
        run: |
          htmlhint index.html impressum.html datenschutz.html

      - name: Check required static assets
        run: |
          test -f css/styles.css
          test -f js/scripts.js
          test -f robots.txt
          test -f sitemap.xml
          test -f DEPLOYMENT.md
